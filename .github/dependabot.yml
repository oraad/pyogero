version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: monthly

  - package-ecosystem: uv
    directory: /
    target-branch: main
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "requests-mock"
          - "aioresponses"
          - "build"
