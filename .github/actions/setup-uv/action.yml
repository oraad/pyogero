name: Setup uv
description: Install uv and sync frozen dev dependencies for pyogero

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
      with:
        python-version: "3.14"
        enable-cache: true
    - run: uv sync --frozen --group dev
      shell: bash
